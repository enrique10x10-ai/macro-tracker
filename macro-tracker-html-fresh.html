<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Macro Tracker">
  <title>Macro Tracker</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // Lucide React icons as inline SVGs
    const Plus = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const Save = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const Clock = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const Calendar = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const Weight = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="5" r="3"/><path d="M6.5 8a2 2 0 0 0-1.905 1.46L2.1 18.5A2 2 0 0 0 4 21h16a2 2 0 0 0 1.925-2.54L19.4 9.5A2 2 0 0 0 17.48 8Z"/></svg>;
    const X = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const CheckCircle = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const XCircle = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
    const Settings = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
    const Utensils = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>;
    const Play = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const StopCircle = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><rect width="6" height="6" x="9" y="9"/></svg>;

    const MacroTracker = () => {
      const [currentMacros, setCurrentMacros] = useState({ protein: '', carbs: '', fats: '' });
      const [mealName, setMealName] = useState('');
      const [currentMealName, setCurrentMealName] = useState('');
      const [mealSearchQuery, setMealSearchQuery] = useState('');
      const [savedMeals, setSavedMeals] = useState([]);
      const [dailyLog, setDailyLog] = useState([]);
      const [weeklyLog, setWeeklyLog] = useState([]);
      const [targets, setTargets] = useState({ 
        training: { protein: 160, carbs: 130, fats: 60 }, 
        nonTraining: { protein: 140, carbs: 100, fats: 50 },
        other: { protein: 150, carbs: 115, fats: 55 }
      });
      const [dayType, setDayType] = useState('training');
      const [weightLog, setWeightLog] = useState([]);
      const [currentWeight, setCurrentWeight] = useState('');
      const [showSettings, setShowSettings] = useState(false);
      const [showWeekly, setShowWeekly] = useState(false);
      const [currentDayId, setCurrentDayId] = useState(null);
      const [dayStartTime, setDayStartTime] = useState(null);
      const [closedDays, setClosedDays] = useState([]);
      const [currentTime, setCurrentTime] = useState(new Date());
      const [waterLog, setWaterLog] = useState([]);
      const [currentWater, setCurrentWater] = useState('');
      const [waterTrackerEnabled, setWaterTrackerEnabled] = useState(false);
      const [editingDayId, setEditingDayId] = useState(null);
      const [editMacros, setEditMacros] = useState({ protein: '', carbs: '', fats: '', name: '' });

      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        const saved = localStorage.getItem('macroTrackerData');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            setSavedMeals(data.savedMeals || []);
            setDailyLog(data.dailyLog || []);
            setWeeklyLog(data.weeklyLog || []);
            if (data.targets) {
              setTargets({
                training: data.targets.training || { protein: 160, carbs: 130, fats: 60 },
                nonTraining: data.targets.nonTraining || { protein: 140, carbs: 100, fats: 50 },
                other: data.targets.other || { protein: 150, carbs: 115, fats: 55 }
              });
            }
            setWeightLog(data.weightLog || []);
            setCurrentDayId(data.currentDayId || null);
            setDayStartTime(data.dayStartTime || null);
            setClosedDays(data.closedDays || []);
            setDayType(data.dayType || 'training');
            setWaterLog(data.waterLog || []);
            setWaterTrackerEnabled(data.waterTrackerEnabled || false);
          } catch (e) {
            console.error('Error loading data:', e);
          }
        }
      }, []);

      useEffect(() => {
        const data = {
          savedMeals,
          dailyLog,
          weeklyLog,
          targets,
          weightLog,
          currentDayId,
          dayStartTime,
          closedDays,
          dayType,
          waterLog,
          waterTrackerEnabled
        };
        localStorage.setItem('macroTrackerData', JSON.stringify(data));
      }, [savedMeals, dailyLog, weeklyLog, targets, weightLog, currentDayId, dayStartTime, closedDays, dayType, waterLog, waterTrackerEnabled]);

      const currentTargets = targets[dayType] || { protein: 0, carbs: 0, fats: 0 };

      const startNewDay = () => {
        const newDayId = Date.now();
        setCurrentDayId(newDayId);
        setDayStartTime(new Date().toLocaleString());
      };

      const logMeal = (protein, carbs, fats, name = 'Manual Entry') => {
        const entry = {
          id: Date.now(),
          protein: parseFloat(protein) || 0,
          carbs: parseFloat(carbs) || 0,
          fats: parseFloat(fats) || 0,
          name,
          timestamp: new Date().toLocaleString(),
          dayId: currentDayId
        };
        setDailyLog([...dailyLog, entry]);
        setWeeklyLog([...weeklyLog, entry]);
        setCurrentMacros({ protein: '', carbs: '', fats: '' });
        setCurrentMealName('');
      };

      const saveMeal = () => {
        if (!mealName || (!currentMacros.protein && !currentMacros.carbs && !currentMacros.fats)) return;
        const meal = {
          id: Date.now(),
          name: mealName,
          protein: parseFloat(currentMacros.protein) || 0,
          carbs: parseFloat(currentMacros.carbs) || 0,
          fats: parseFloat(currentMacros.fats) || 0
        };
        setSavedMeals([...savedMeals, meal]);
        setMealName('');
      };

      const logSavedMeal = (meal) => {
        logMeal(meal.protein, meal.carbs, meal.fats, meal.name);
      };

      const deleteSavedMeal = (id) => {
        setSavedMeals(savedMeals.filter(m => m.id !== id));
      };

      const deleteMealEntry = (id) => {
        setDailyLog(dailyLog.filter(e => e.id !== id));
        setWeeklyLog(weeklyLog.filter(e => e.id !== id));
      };

      const logWater = () => {
        if (!currentWater) return;
        const entry = {
          id: Date.now(),
          amount: parseFloat(currentWater),
          timestamp: new Date().toLocaleString(),
          dayId: currentDayId
        };
        setWaterLog([...waterLog, entry]);
        setCurrentWater('');
      };

      const calculateWaterTotals = (log, dayId = null) => {
        const filtered = dayId ? log.filter(entry => entry.dayId === dayId) : log;
        return filtered.reduce((acc, entry) => acc + entry.amount, 0);
      };

      const logWeight = () => {
        if (!currentWeight) return;
        const entry = {
          id: Date.now(),
          weight: parseFloat(currentWeight),
          date: new Date().toLocaleString()
        };
        setWeightLog([...weightLog, entry]);
        setCurrentWeight('');
      };

      const calculateTotals = (log, dayId = null) => {
        const filtered = dayId ? log.filter(entry => entry.dayId === dayId) : log;
        return filtered.reduce((acc, entry) => ({
          protein: acc.protein + entry.protein,
          carbs: acc.carbs + entry.carbs,
          fats: acc.fats + entry.fats
        }), { protein: 0, carbs: 0, fats: 0 });
      };

      const dailyTotals = calculateTotals(dailyLog, currentDayId);
      const weeklyTotals = calculateTotals(weeklyLog);

      const calculateCalories = (totals) => {
        return (totals.protein * 4) + (totals.carbs * 4) + (totals.fats * 9);
      };

      const getPercentage = (value, target) => {
        return target > 0 ? Math.round((value / target) * 100) : 0;
      };

      const endDay = () => {
        if (!currentDayId) return;
        const summary = {
          id: currentDayId,
          startTime: dayStartTime,
          endTime: new Date().toLocaleString(),
          totals: dailyTotals,
          targets: currentTargets,
          dayType,
          entries: dailyLog.filter(entry => entry.dayId === currentDayId),
          calories: calculateCalories(dailyTotals)
        };
        setClosedDays([...closedDays, summary]);
        setCurrentDayId(null);
        setDayStartTime(null);
        setDailyLog(dailyLog.filter(entry => entry.dayId !== currentDayId));
      };

      const addMealToClosedDay = (dayId) => {
        if (!editMacros.protein && !editMacros.carbs && !editMacros.fats) return;
        
        const newEntry = {
          id: Date.now(),
          protein: parseFloat(editMacros.protein) || 0,
          carbs: parseFloat(editMacros.carbs) || 0,
          fats: parseFloat(editMacros.fats) || 0,
          name: editMacros.name || 'Added Later',
          timestamp: new Date().toLocaleString(),
          dayId: dayId
        };

        const updatedClosedDays = closedDays.map(day => {
          if (day.id === dayId) {
            const updatedEntries = [...day.entries, newEntry];
            const updatedTotals = updatedEntries.reduce((acc, entry) => ({
              protein: acc.protein + entry.protein,
              carbs: acc.carbs + entry.carbs,
              fats: acc.fats + entry.fats
            }), { protein: 0, carbs: 0, fats: 0 });
            
            return {
              ...day,
              entries: updatedEntries,
              totals: updatedTotals,
              calories: calculateCalories(updatedTotals)
            };
          }
          return day;
        });

        setClosedDays(updatedClosedDays);
        setWeeklyLog([...weeklyLog, newEntry]);
        setEditMacros({ protein: '', carbs: '', fats: '', name: '' });
        setEditingDayId(null);
      };

      const MacroCard = ({ label, value, target, color }) => {
        const percentage = getPercentage(value, target);
        return (
          <div className="bg-slate-800/40 backdrop-blur border border-cyan-500/30 rounded-xl p-4">
            <div className="text-slate-400 text-sm mb-1">{label}</div>
            <div className="text-2xl font-bold text-white mb-2">{value}g</div>
            <div className="flex items-center gap-2">
              <div className="flex-1 bg-slate-700 rounded-full h-2">
                <div 
                  className={`${color} h-2 rounded-full transition-all duration-500`}
                  style={{ width: `${Math.min(percentage, 100)}%` }}
                />
              </div>
              <span className={`text-sm font-semibold ${percentage >= 100 ? 'text-green-400' : 'text-cyan-400'}`}>
                {percentage}%
              </span>
            </div>
            <div className="text-xs text-slate-500 mt-1">Target: {target}g</div>
          </div>
        );
      };

      const updateTargetValue = (dayTypeKey, macroKey, value) => {
        setTargets({
          ...targets,
          [dayTypeKey]: {
            ...targets[dayTypeKey],
            [macroKey]: value === '' ? '' : parseInt(value) || 0
          }
        });
      };

      const exportData = () => {
        const data = {
          savedMeals,
          dailyLog,
          weeklyLog,
          targets,
          weightLog,
          currentDayId,
          dayStartTime,
          closedDays,
          dayType,
          waterLog,
          waterTrackerEnabled,
          exportDate: new Date().toISOString(),
          version: '1.0'
        };
        
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `macro-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      };

      const importData = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            
            if (data.savedMeals) setSavedMeals(data.savedMeals);
            if (data.dailyLog) setDailyLog(data.dailyLog);
            if (data.weeklyLog) setWeeklyLog(data.weeklyLog);
            if (data.targets) setTargets(data.targets);
            if (data.weightLog) setWeightLog(data.weightLog);
            if (data.currentDayId !== undefined) setCurrentDayId(data.currentDayId);
            if (data.dayStartTime) setDayStartTime(data.dayStartTime);
            if (data.closedDays) setClosedDays(data.closedDays);
            if (data.dayType) setDayType(data.dayType);
            if (data.waterLog) setWaterLog(data.waterLog);
            if (data.waterTrackerEnabled !== undefined) setWaterTrackerEnabled(data.waterTrackerEnabled);
            
            alert('Data imported successfully!');
          } catch (error) {
            alert('Error importing data. Please make sure the file is a valid backup.');
            console.error('Import error:', error);
          }
        };
        reader.readAsText(file);
        event.target.value = '';
      };

      if (showSettings) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-gray-900 via-slate-900 to-black p-4">
            <div className="max-w-2xl mx-auto">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-2xl font-bold text-white flex items-center gap-2">
                  <Settings className="w-6 h-6 text-cyan-400" />
                  Settings
                </h2>
                <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-white">
                  <X className="w-6 h-6" />
                </button>
              </div>

              <div className="space-y-6">
                <div className="bg-slate-800/40 backdrop-blur border border-cyan-500/30 rounded-xl p-6">
                  <h3 className="text-lg font-bold text-white mb-4">Training Day Targets</h3>
                  <div className="grid grid-cols-3 gap-4">
                    <div>
                      <label className="text-slate-400 text-sm">Protein (g)</label>
                      <input
                        type="number"
                        value={targets.training.protein}
                        onChange={(e) => updateTargetValue('training', 'protein', e.target.value)}
                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white mt-1"
                      />
                    </div>
                    <div>
                      <label className="text-slate-400 text-sm">Carbs (g)</label>
                      <input
                        type="number"
                        value={targets.training.carbs}
                        onChange={(e) => updateTargetValue('training', 'carbs', e.target.value)}
                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white mt-1"
                      />
                    </div>
                    <div>
                      <label className="text-slate-400 text-sm">Fats (g)</label>
                      <input
                        type="number"
                        value={targets.training.fats}
                        onChange={(e) => updateTargetValue('training', 'fats', e.target.value)}
                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white mt-1"
                      />
                    </div>
                  </div>
                  <div className="mt-4 bg-cyan-500/10 border border-cyan-500/30 rounded-lg p-3 text-center">
                    <div className="text-cyan-400 text-sm">Target Calories</div>
                    <div className="text-white text-2xl font-bold">
                      {calculateCalories(targets.training).toLocaleString()} cal
                    </div>
                  </div>
                </div>

                <div className="bg-slate-800/40 backdrop-blur border border-cyan-500/30 rounded-xl p-6">
                  <h3 className="text-lg font-bold text-white mb-4">Rest Day Targets</h3>
                  <div className="grid grid-cols-3 gap-4">
                    <div>
                      <label className="text-slate-400 text-sm">Protein (g)</label>
                      <input
                        type="number"
                        value={targets.nonTraining.protein}
                        onChange={(e) => updateTargetValue('nonTraining', 'protein', e.target.value)}
                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white mt-1"
                      />
                    </div>
                    <div>
                      <label className="text-slate-400 text-sm">Carbs (g)</label>
                      <input
                        type="number"
                        value={targets.nonTraining.carbs}
                        onChange={(e) => updateTargetValue('nonTraining', 'carbs', e.target.value)}
                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white mt-1"
                      />
                    </div>
                    <div>
                      <label className="text-slate-400 text-sm">Fats (g)</label>
                      <input
                        type="number"
                        value={targets.nonTraining.fats}
                        onChange={(e) => updateTargetValue('nonTraining', 'fats', e.target.value)}
                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white mt-1"
                      />
                    </div>
                  </div>
                  <div className="mt-4 bg-cyan-500/10 border border-cyan-500/30 rounded-lg p-3 text-center">
                    <div className="text-cyan-400 text-sm">Target Calories</div>
                    <div className="text-white text-2xl font-bold">
                      {calculateCalories(targets.nonTraining).toLocaleString()} cal
                    </div>
                  </div>
                </div>

                <div className="bg-slate-800/40 backdrop-blur border border-cyan-500/30 rounded-xl p-6">
                  <h3 className="text-lg font-bold text-white mb-4">Other Day Targets</h3>
                  <div className="grid grid-cols-3 gap-4">
                    <div>
                      <label className="text-slate-400 text-sm">Protein (g)</label>
                      <input
                        type="number"
                        value={targets.other.protein}
                        onChange={(e) => updateTargetValue('other', 'protein', e.target.value)}
                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white mt-1"
                      />
                    </div>
                    <div>
                      <label className="text-slate-400 text-sm">Carbs (g)</label>
                      <input
                        type="number"
                        value={targets.other.carbs}
                        onChange={(e) => updateTargetValue('other', 'carbs', e.target.value)}
                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white mt-1"
                      />
                    </div>
                    <div>
                      <label className="text-slate-400 text-sm">Fats (g)</label>
                      <input
                        type="number"
                        value={targets.other.fats}
                        onChange={(e) => updateTargetValue('other', 'fats', e.target.value)}
                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white mt-1"
                      />
                    </div>
                  </div>
                  <div className="mt-4 bg-cyan-500/10 border border-cyan-500/30 rounded-lg p-3 text-center">
                    <div className="text-cyan-400 text-sm">Target Calories</div>
                    <div className="text-white text-2xl font-bold">
                      {calculateCalories(targets.other).toLocaleString()} cal
                    </div>
                  </div>
                </div>

                <div className="bg-slate-800/40 backdrop-blur border border-cyan-500/30 rounded-xl p-6">
                  <h3 className="text-lg font-bold text-white mb-4 flex items-center gap-2">
                    <Weight className="w-5 h-5 text-cyan-400" />
                    Weight Tracking
                  </h3>
                  <div className="flex gap-3 mb-4">
                    <input
                      type="number"
                      value={currentWeight}
                      onChange={(e) => setCurrentWeight(e.target.value)}
                      placeholder="Current weight (lbs)"
                      className="flex-1 bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-white focus:border-cyan-500 focus:outline-none"
                    />
                    <button
                      onClick={logWeight}
                      className="bg-cyan-500 hover:bg-cyan-400 text-white px-6 py-3 rounded-lg font-semibold"
                    >
                      Log
                    </button>
                  </div>
                  {weightLog.length > 0 && (
                    <div className="space-y-2">

                        <div key={entry.id} className="bg-slate-700/50 rounded-lg p-3">
                          <div className="flex justify-between items-start mb-1">
                            <span className="text-white font-semibold">{entry.name}</span>
                            <div className="flex items-center gap-2">
                              <span className="text-xs text-slate-400">{entry.timestamp}</span>
                              <button
                                onClick={() => deleteMealEntry(entry.id)}
                                className="text-red-400 hover:text-red-300"
                              >
                                <X className="w-4 h-4" />
                              </button>
                            </div>
                          </div>
                          <div className="text-sm text-slate-300">
                            P: {entry.protein}g • C: {entry.carbs}g • F: {entry.fats}g • {calculateCalories(entry)} cal
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </>
            )}

            {!currentDayId && (
              <div className="bg-slate-800/40 backdrop-blur border border-cyan-500/30 rounded-xl p-12 text-center">
                <div className="text-slate-400 text-lg mb-2">No active day</div>
                <div className="text-slate-500">Click "Start New Day" to begin tracking</div>
              </div>
            )}

            {currentDayId && waterTrackerEnabled && (
              <div className="bg-slate-800/40 backdrop-blur border border-cyan-500/30 rounded-xl p-6">
                <h3 className="text-lg font-bold text-white mb-4">💧 Water Tracker</h3>
                <div className="flex gap-3 mb-3">
                  <input
                    type="number"
                    value={currentWater}
                    onChange={(e) => setCurrentWater(e.target.value)}
                    placeholder="Amount (oz)"
                    className="flex-1 bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-white focus:border-cyan-500 focus:outline-none"
                  />
                  <button
                    onClick={logWater}
                    className="bg-cyan-500 hover:bg-cyan-400 text-white px-6 py-3 rounded-lg font-semibold"
                  >
                    Log
                  </button>
                </div>
                <div className="bg-slate-700/50 rounded-lg p-3 text-center">
                  <div className="text-2xl font-bold text-cyan-400">{calculateWaterTotals(waterLog, currentDayId)} oz</div>
                  <div className="text-xs text-slate-400">Today</div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    ReactDOM.render(<MacroTracker />, document.getElementById('root'));
  </script>
</body>
</html>
