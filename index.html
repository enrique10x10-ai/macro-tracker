<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Macro Tracker">
  <title>Macro Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #111827, #0f172a, #000); min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff; }
    #app { max-width: 42rem; margin: 0 auto; padding: 1rem 1rem 6rem; }
    h1 { font-size: 1.875rem; font-weight: 700; color: #fff; }
    h2 { font-size: 1.5rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: .5rem; }
    h3 { font-size: 1.125rem; font-weight: 700; color: #fff; }

    /* Cards */
    .card { background: rgba(30,41,59,0.4); backdrop-filter: blur(4px); border: 1px solid rgba(34,211,238,0.3); border-radius: .75rem; padding: 1rem; margin-bottom: 1.5rem; }
    .card-p6 { padding: 1.5rem; }

    /* Buttons */
    button { cursor: pointer; border: none; font-family: inherit; font-size: .875rem; font-weight: 600; border-radius: .5rem; transition: all .15s; }
    .btn-green { background: #22c55e; color: #fff; width: 100%; padding: .75rem; display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .btn-green:hover { background: #4ade80; }
    .btn-red { background: rgba(239,68,68,0.2); border: 2px solid #ef4444; color: #f87171; width: 100%; padding: .75rem; display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .btn-red:hover { background: rgba(239,68,68,0.3); }
    .btn-cyan { background: #06b6d4; color: #fff; padding: .75rem 1.5rem; }
    .btn-cyan:hover { background: #22d3ee; }
    .btn-cyan-full { background: #06b6d4; color: #fff; width: 100%; padding: .75rem; display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .btn-cyan-full:hover { background: #22d3ee; }
    .btn-slate { background: #334155; color: #22d3ee; width: 100%; padding: .75rem; display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .btn-slate:hover { background: #475569; }
    .btn-day { padding: .5rem 1rem; font-weight: 600; transition: all .15s; }
    .btn-day-active { background: #06b6d4; color: #fff; }
    .btn-day-inactive { background: #334155; color: #94a3b8; }
    .btn-icon { background: rgba(30,41,59,0.4); border: 1px solid rgba(34,211,238,0.3); color: #22d3ee; padding: .5rem; border-radius: .5rem; }
    .btn-text-cyan { background: none; color: #22d3ee; font-size: .875rem; display: flex; align-items: center; gap: .25rem; padding: .25rem; }
    .btn-text-cyan:hover { color: #67e8f9; }
    .btn-back { background: none; color: #94a3b8; padding: .5rem; }
    .btn-back:hover { color: #fff; }
    .btn-log-meal { background: #06b6d4; color: #fff; padding: .5rem 1rem; border-radius: .5rem; font-size: .875rem; }
    .btn-delete { background: none; color: #f87171; padding: .25rem; }
    .btn-delete:hover { color: #fca5a5; }

    /* Inputs */
    input[type=text], input[type=number] { background: #334155; border: 1px solid #475569; border-radius: .5rem; padding: .75rem 1rem; color: #fff; font-family: inherit; font-size: 1rem; width: 100%; }
    input[type=text]:focus, input[type=number]:focus { outline: none; border-color: #06b6d4; }
    input::placeholder { color: #64748b; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .input-sm { padding: .5rem .75rem; font-size: .875rem; }

    /* Grid layouts */
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    .grid-3-sm { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .75rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin-bottom: .75rem; }
    .flex { display: flex; }
    .flex-col { display: flex; flex-direction: column; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .gap-2 { gap: .5rem; }
    .gap-3 { gap: .75rem; }
    .flex-1 { flex: 1; }
    .w-full { width: 100%; }

    /* Macro cards */
    .macro-card { background: rgba(30,41,59,0.4); border: 1px solid rgba(34,211,238,0.3); border-radius: .75rem; padding: 1rem; }
    .macro-label { color: #94a3b8; font-size: .875rem; margin-bottom: .25rem; }
    .macro-value { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: .5rem; }
    .macro-target { font-size: .75rem; color: #64748b; margin-top: .25rem; }
    .progress-track { flex: 1; background: #334155; border-radius: 9999px; height: .5rem; overflow: hidden; }
    .progress-bar { height: .5rem; border-radius: 9999px; transition: width .5s; }
    .progress-pct-hit { font-size: .875rem; font-weight: 600; color: #4ade80; }
    .progress-pct { font-size: .875rem; font-weight: 600; color: #22d3ee; }

    /* Calories box */
    .cal-box { margin-bottom: 1.5rem; }
    .cal-num { font-size: 1.875rem; font-weight: 700; color: #fff; margin-bottom: .25rem; }
    .cal-label { color: #94a3b8; }

    /* Day type row */
    .day-type-label { color: #cbd5e1; font-size: .875rem; margin-bottom: .75rem; }

    /* Header */
    .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; }
    .header-date { color: #94a3b8; font-size: .875rem; margin-top: .25rem; }
    .header-time { color: #22d3ee; font-size: .875rem; font-weight: 600; }
    .header-actions { display: flex; gap: .5rem; }

    /* Section header */
    .section-header { display: flex; align-items: center; gap: .5rem; margin-bottom: 1rem; }
    .section-header svg { color: #22d3ee; }

    /* Meal items */
    .meal-item { background: rgba(51,65,85,0.5); border-radius: .5rem; padding: .75rem; margin-bottom: .5rem; }
    .meal-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .25rem; }
    .meal-name { font-weight: 600; color: #fff; }
    .meal-time { font-size: .75rem; color: #94a3b8; }
    .meal-macros { font-size: .875rem; color: #cbd5e1; }
    .meal-actions { display: flex; align-items: center; gap: .5rem; }

    /* Library items */
    .lib-item { background: rgba(51,65,85,0.5); border-radius: .5rem; padding: 1rem; margin-bottom: .5rem; display: flex; align-items: center; justify-content: space-between; }
    .lib-name { font-weight: 600; color: #fff; margin-bottom: .25rem; }
    .lib-macros { font-size: .875rem; color: #94a3b8; }
    .lib-actions { display: flex; gap: .5rem; }

    /* Day started text */
    .day-started { font-size: .875rem; color: #94a3b8; margin-bottom: .75rem; }
    .day-started span { color: #fff; font-weight: 600; }

    /* Empty state */
    .empty { background: rgba(30,41,59,0.4); border: 1px solid rgba(34,211,238,0.3); border-radius: .75rem; padding: 3rem; text-align: center; }
    .empty-title { color: #94a3b8; font-size: 1.125rem; margin-bottom: .5rem; }
    .empty-sub { color: #64748b; }

    /* Weekly */
    .weekly-stat-card { background: rgba(30,41,59,0.4); border: 1px solid rgba(34,211,238,0.3); border-radius: .75rem; padding: 1rem; }
    .stat-label { color: #94a3b8; font-size: .875rem; margin-bottom: .25rem; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: .5rem; }
    .stat-avg { font-size: .75rem; color: #64748b; }
    .cal-total-card { background: rgba(30,41,59,0.4); border: 1px solid rgba(34,211,238,0.3); border-radius: .75rem; padding: 1.5rem; margin-bottom: 1.5rem; }
    .cal-total-num { font-size: 1.875rem; font-weight: 700; color: #fff; margin-bottom: .25rem; }
    .water-total { font-size: 1.875rem; font-weight: 700; color: #22d3ee; margin-bottom: .25rem; }

    /* Bar chart */
    .chart-wrap { display: flex; align-items: flex-end; justify-content: space-between; gap: .5rem; height: 16rem; border-bottom: 1px solid #334155; padding-bottom: .5rem; }
    .chart-col { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; height: 100%; }
    .chart-bar { width: 100%; border-radius: .25rem .25rem 0 0; transition: height .5s; min-height: 8px; }
    .chart-cal { font-size: .75rem; color: #fff; font-weight: 600; }
    .chart-date { font-size: .75rem; color: #94a3b8; }
    .chart-pct { font-size: .75rem; color: #22d3ee; }
    .chart-labels { display: flex; flex-direction: column; align-items: center; margin-top: .5rem; gap: .125rem; }

    /* Closed days */
    .closed-day { background: rgba(51,65,85,0.5); border-radius: .5rem; padding: 1rem; margin-bottom: .75rem; }
    .closed-dot { width: .75rem; height: .75rem; border-radius: 50%; flex-shrink: 0; }
    .closed-time { font-weight: 600; color: #fff; }
    .closed-end { font-size: .75rem; color: #94a3b8; }
    .closed-macros { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .5rem; font-size: .875rem; margin-bottom: .5rem; }
    .closed-summary { font-size: .75rem; color: #94a3b8; }
    .macro-hit { color: #4ade80; }
    .macro-miss { color: #f87171; }

    /* Settings */
    .target-card { background: rgba(30,41,59,0.4); border: 1px solid rgba(34,211,238,0.3); border-radius: .75rem; padding: 1.5rem; margin-bottom: 1rem; }
    .target-header { font-size: 1.125rem; font-weight: 700; color: #fff; margin-bottom: 1rem; }
    .target-cal-box { margin-top: 1rem; background: rgba(34,211,238,0.1); border: 1px solid rgba(34,211,238,0.3); border-radius: .5rem; padding: .75rem; text-align: center; }
    .target-cal-label { color: #22d3ee; font-size: .875rem; }
    .target-cal-num { color: #fff; font-size: 1.5rem; font-weight: 700; }
    .input-label { color: #94a3b8; font-size: .875rem; display: block; margin-bottom: .25rem; }
    .weight-entry { display: flex; justify-content: space-between; align-items: center; font-size: .875rem; background: rgba(51,65,85,0.3); border-radius: .5rem; padding: .75rem; margin-bottom: .5rem; }
    .water-toggle { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .water-toggle-label { color: #cbd5e1; }
    .toggle-on { background: #06b6d4; color: #fff; padding: .5rem 1rem; border-radius: .5rem; font-size: .875rem; }
    .toggle-off { background: #334155; color: #94a3b8; padding: .5rem 1rem; border-radius: .5rem; font-size: .875rem; }
    .backup-note { font-size: .75rem; color: #94a3b8; margin-top: .5rem; }
    .file-label { display: flex; align-items: center; justify-content: center; gap: .5rem; background: #334155; color: #22d3ee; font-weight: 600; padding: .75rem; border-radius: .5rem; cursor: pointer; width: 100%; margin-bottom: .5rem; }
    .file-label:hover { background: #475569; }

    /* Water tracker */
    .water-display { background: rgba(51,65,85,0.5); border-radius: .5rem; padding: .75rem; text-align: center; }
    .water-oz { font-size: 1.5rem; font-weight: 700; color: #22d3ee; }
    .water-today { font-size: .75rem; color: #94a3b8; }

    /* Edit meal panel */
    .edit-panel { background: rgba(30,41,59,0.5); border: 1px solid rgba(34,211,238,0.3); border-radius: .5rem; padding: 1rem; margin-bottom: .75rem; }

    /* SVG icons */
    svg { display: inline-block; vertical-align: middle; flex-shrink: 0; }

    /* Spacing utils */
    .mb-1 { margin-bottom: .25rem; }
    .mb-2 { margin-bottom: .5rem; }
    .mb-3 { margin-bottom: .75rem; }
    .mb-4 { margin-bottom: 1rem; }
    .mb-6 { margin-bottom: 1.5rem; }
    .mt-1 { margin-top: .25rem; }
    .space-y > * + * { margin-top: .5rem; }
    .text-xs { font-size: .75rem; }
    .text-sm { font-size: .875rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ─── SVG Icons ────────────────────────────────────────────────────────────────
const svg = (path, extra='') => `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ${extra}>${path}</svg>`;
const icons = {
  play: svg('<polygon points="5 3 19 12 5 21 5 3"/>'),
  stop: svg('<circle cx="12" cy="12" r="10"/><rect width="6" height="6" x="9" y="9"/>'),
  plus: svg('<path d="M5 12h14"/><path d="M12 5v14"/>'),
  save: svg('<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>'),
  x: svg('<path d="M18 6 6 18"/><path d="m6 6 12 12"/>'),
  x16: svg('<path d="M18 6 6 18"/><path d="m6 6 12 12"/>', 'width="16" height="16"'),
  settings: svg('<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>'),
  calendar: svg('<rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>'),
  utensils: svg('<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>'),
  weight: svg('<circle cx="12" cy="5" r="3"/><path d="M6.5 8a2 2 0 0 0-1.905 1.46L2.1 18.5A2 2 0 0 0 4 21h16a2 2 0 0 0 1.925-2.54L19.4 9.5A2 2 0 0 0 17.48 8Z"/>'),
  check: svg('<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'),
  xcircle: svg('<circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>'),
};

// ─── State ────────────────────────────────────────────────────────────────────
const DEFAULT_TARGETS = {
  training:    { protein: 160, carbs: 130, fats: 60 },
  nonTraining: { protein: 140, carbs: 100, fats: 50 },
  other:       { protein: 150, carbs: 115, fats: 55 },
};

function load(k, d) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch(e) { return d; } }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

let state = {
  view: 'main', // main | settings | weekly
  savedMeals:         load('mt_savedMeals', []),
  dailyLog:           load('mt_dailyLog', []),
  weeklyLog:          load('mt_weeklyLog', []),
  targets:            load('mt_targets', DEFAULT_TARGETS),
  weightLog:          load('mt_weightLog', []),
  currentDayId:       load('mt_currentDayId', null),
  dayStartTime:       load('mt_dayStartTime', null),
  closedDays:         load('mt_closedDays', []),
  dayType:            load('mt_dayType', 'training'),
  waterLog:           load('mt_waterLog', []),
  waterTrackerEnabled:load('mt_waterEnabled', false),
  editingDayId:       null,
  editMacros:         { protein: '', carbs: '', fats: '', name: '' },
  currentMacros:      { protein: '', carbs: '', fats: '' },
  currentMealName:    '',
  mealName:           '',
  mealSearch:         '',
  currentWeight:      '',
  currentWater:       '',
  currentTime:        new Date(),
};

function persist() {
  save('mt_savedMeals',  state.savedMeals);
  save('mt_dailyLog',    state.dailyLog);
  save('mt_weeklyLog',   state.weeklyLog);
  save('mt_targets',     state.targets);
  save('mt_weightLog',   state.weightLog);
  save('mt_currentDayId',  state.currentDayId);
  save('mt_dayStartTime',  state.dayStartTime);
  save('mt_closedDays',    state.closedDays);
  save('mt_dayType',       state.dayType);
  save('mt_waterLog',      state.waterLog);
  save('mt_waterEnabled',  state.waterTrackerEnabled);
}

// ─── Calculations ─────────────────────────────────────────────────────────────
function calcCals(p, c, f) { return Math.round((p||0)*4 + (c||0)*4 + (f||0)*9); }
function calcTotals(log, dayId) {
  const entries = dayId ? log.filter(e => e.dayId === dayId) : log;
  return entries.reduce((a, e) => ({ protein: a.protein + e.protein, carbs: a.carbs + e.carbs, fats: a.fats + e.fats }), { protein:0, carbs:0, fats:0 });
}
function calcWater(log, dayId) {
  const entries = dayId ? log.filter(e => e.dayId === dayId) : log;
  return entries.reduce((a, e) => a + e.amount, 0);
}
function pct(value, target) { return target > 0 ? Math.round((value/target)*100) : 0; }

// ─── Actions ──────────────────────────────────────────────────────────────────
function startNewDay() {
  state.currentDayId = Date.now();
  state.dayStartTime = new Date().toLocaleString();
  persist(); render();
}

function endDay() {
  if (!state.currentDayId) return;
  const totals = calcTotals(state.dailyLog, state.currentDayId);
  const targets = state.targets[state.dayType] || state.targets.training;
  state.closedDays.push({
    id: state.currentDayId,
    startTime: state.dayStartTime,
    endTime: new Date().toLocaleString(),
    totals, targets,
    dayType: state.dayType,
    entries: state.dailyLog.filter(e => e.dayId === state.currentDayId),
    calories: calcCals(totals.protein, totals.carbs, totals.fats),
  });
  state.dailyLog = state.dailyLog.filter(e => e.dayId !== state.currentDayId);
  state.currentDayId = null;
  state.dayStartTime = null;
  persist(); render();
}

function logMeal(protein, carbs, fats, name) {
  const entry = {
    id: Date.now(),
    protein: parseFloat(protein)||0,
    carbs: parseFloat(carbs)||0,
    fats: parseFloat(fats)||0,
    name: name || 'Manual Entry',
    timestamp: new Date().toLocaleString(),
    dayId: state.currentDayId,
  };
  state.dailyLog.push(entry);
  state.weeklyLog.push(entry);
  state.currentMacros = { protein:'', carbs:'', fats:'' };
  state.currentMealName = '';
  persist(); render();
}

function saveMealToLibrary() {
  const { protein, carbs, fats } = state.currentMacros;
  if (!state.mealName || (!protein && !carbs && !fats)) return;
  state.savedMeals.push({
    id: Date.now(),
    name: state.mealName,
    protein: parseFloat(protein)||0,
    carbs: parseFloat(carbs)||0,
    fats: parseFloat(fats)||0,
  });
  state.mealName = '';
  persist(); render();
}

function deleteSavedMeal(id) { state.savedMeals = state.savedMeals.filter(m => m.id !== id); persist(); render(); }
function deleteMealEntry(id) {
  state.dailyLog = state.dailyLog.filter(e => e.id !== id);
  state.weeklyLog = state.weeklyLog.filter(e => e.id !== id);
  persist(); render();
}

function logWater() {
  if (!state.currentWater) return;
  state.waterLog.push({ id: Date.now(), amount: parseFloat(state.currentWater), timestamp: new Date().toLocaleString(), dayId: state.currentDayId });
  state.currentWater = '';
  persist(); render();
}

function logWeight() {
  if (!state.currentWeight) return;
  state.weightLog.push({ id: Date.now(), weight: parseFloat(state.currentWeight), date: new Date().toLocaleString() });
  state.currentWeight = '';
  persist(); render();
}

function addMealToClosedDay(dayId) {
  const { protein, carbs, fats, name } = state.editMacros;
  if (!protein && !carbs && !fats) return;
  const entry = {
    id: Date.now(),
    protein: parseFloat(protein)||0,
    carbs: parseFloat(carbs)||0,
    fats: parseFloat(fats)||0,
    name: name || 'Added Later',
    timestamp: new Date().toLocaleString(),
    dayId,
  };
  state.closedDays = state.closedDays.map(day => {
    if (day.id !== dayId) return day;
    const entries = [...day.entries, entry];
    const totals = entries.reduce((a,e) => ({ protein: a.protein+e.protein, carbs: a.carbs+e.carbs, fats: a.fats+e.fats }), {protein:0,carbs:0,fats:0});
    return { ...day, entries, totals, calories: calcCals(totals.protein, totals.carbs, totals.fats) };
  });
  state.weeklyLog.push(entry);
  state.editMacros = { protein:'', carbs:'', fats:'', name:'' };
  state.editingDayId = null;
  persist(); render();
}

function exportData() {
  const data = {
    savedMeals: state.savedMeals, dailyLog: state.dailyLog, weeklyLog: state.weeklyLog,
    targets: state.targets, weightLog: state.weightLog, currentDayId: state.currentDayId,
    dayStartTime: state.dayStartTime, closedDays: state.closedDays, dayType: state.dayType,
    waterLog: state.waterLog, waterTrackerEnabled: state.waterTrackerEnabled,
    exportDate: new Date().toISOString(), version: '1.0',
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `macro-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.savedMeals) state.savedMeals = data.savedMeals;
      if (data.dailyLog) state.dailyLog = data.dailyLog;
      if (data.weeklyLog) state.weeklyLog = data.weeklyLog;
      if (data.targets) state.targets = data.targets;
      if (data.weightLog) state.weightLog = data.weightLog;
      if (data.currentDayId !== undefined) state.currentDayId = data.currentDayId;
      if (data.dayStartTime) state.dayStartTime = data.dayStartTime;
      if (data.closedDays) state.closedDays = data.closedDays;
      if (data.dayType) state.dayType = data.dayType;
      if (data.waterLog) state.waterLog = data.waterLog;
      if (data.waterTrackerEnabled !== undefined) state.waterTrackerEnabled = data.waterTrackerEnabled;
      persist(); render();
      alert('Data imported successfully!');
    } catch(err) { alert('Error importing data. Please check the file.'); }
  };
  reader.readAsText(file);
}

// ─── Render helpers ───────────────────────────────────────────────────────────
function macroCard(label, value, target, color) {
  const p = pct(value, target);
  const hit = p >= 100;
  return `<div class="macro-card">
    <div class="macro-label">${label}</div>
    <div class="macro-value">${value}g</div>
    <div class="flex items-center gap-2">
      <div class="progress-track"><div class="progress-bar" style="width:${Math.min(p,100)}%;background:${color}"></div></div>
      <span class="${hit ? 'progress-pct-hit' : 'progress-pct'}">${p}%</span>
    </div>
    <div class="macro-target">Target: ${target}g</div>
  </div>`;
}

function targetSection(key, label) {
  const t = state.targets[key] || DEFAULT_TARGETS[key];
  const cal = calcCals(t.protein, t.carbs, t.fats);
  return `<div class="target-card">
    <div class="target-header">${label} Targets</div>
    <div class="grid-3">
      <div><label class="input-label">Protein (g)</label><input class="input-sm" type="number" value="${t.protein}" onchange="state.targets['${key}'].protein=parseInt(this.value)||0;persist();renderTargetCal('${key}')"></div>
      <div><label class="input-label">Carbs (g)</label><input class="input-sm" type="number" value="${t.carbs}" onchange="state.targets['${key}'].carbs=parseInt(this.value)||0;persist();renderTargetCal('${key}')"></div>
      <div><label class="input-label">Fats (g)</label><input class="input-sm" type="number" value="${t.fats}" onchange="state.targets['${key}'].fats=parseInt(this.value)||0;persist();renderTargetCal('${key}')"></div>
    </div>
    <div class="target-cal-box" id="tcal-${key}">
      <div class="target-cal-label">Target Calories</div>
      <div class="target-cal-num">${cal.toLocaleString()} cal</div>
    </div>
  </div>`;
}

function renderTargetCal(key) {
  const el = document.getElementById('tcal-' + key);
  if (!el) return;
  const t = state.targets[key];
  const cal = calcCals(t.protein, t.carbs, t.fats);
  el.innerHTML = `<div class="target-cal-label">Target Calories</div><div class="target-cal-num">${cal.toLocaleString()} cal</div>`;
}

// ─── Views ────────────────────────────────────────────────────────────────────
function renderMain() {
  const dayId = state.currentDayId;
  const targets = state.targets[state.dayType] || state.targets.training;
  const totals = calcTotals(state.dailyLog, dayId);
  const totalCals = calcCals(totals.protein, totals.carbs, totals.fats);
  const todayEntries = state.dailyLog.filter(e => e.dayId === dayId);
  const filtered = state.savedMeals.filter(m => m.name.toLowerCase().includes(state.mealSearch.toLowerCase())).sort((a,b) => a.name.localeCompare(b.name));

  return `
  <div class="header">
    <div>
      <h1>Macro Tracker</h1>
      <div class="header-date">${state.currentTime.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' })}</div>
      <div class="header-time">${state.currentTime.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', second:'2-digit' })}</div>
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="state.view='weekly';render()" title="Weekly">${icons.calendar}</button>
      <button class="btn-icon" onclick="state.view='settings';render()" title="Settings">${icons.settings}</button>
    </div>
  </div>

  <div class="card mb-6">
    ${!dayId ? `
      <button class="btn-green" onclick="startNewDay()">${icons.play} Start New Day</button>
    ` : `
      <div class="day-started">Day started: <span>${state.dayStartTime}</span></div>
      <button class="btn-red" onclick="endDay()">${icons.stop} End Day &amp; View Summary</button>
    `}
  </div>

  ${dayId ? `
  <div class="card mb-6">
    <div class="day-type-label">Today is a:</div>
    <div class="grid-3">
      <button class="btn-day ${state.dayType==='training'?'btn-day-active':'btn-day-inactive'}" onclick="state.dayType='training';persist();render()">Training</button>
      <button class="btn-day ${state.dayType==='nonTraining'?'btn-day-active':'btn-day-inactive'}" onclick="state.dayType='nonTraining';persist();render()">Rest</button>
      <button class="btn-day ${state.dayType==='other'?'btn-day-active':'btn-day-inactive'}" onclick="state.dayType='other';persist();render()">Other</button>
    </div>
  </div>

  <div class="grid-3 mb-6">
    ${macroCard('Protein', totals.protein, targets.protein, '#fb923c')}
    ${macroCard('Carbs', totals.carbs, targets.carbs, '#3b82f6')}
    ${macroCard('Fats', totals.fats, targets.fats, '#a855f7')}
  </div>

  <div class="card cal-box card-p6">
    <div class="cal-num">${totalCals.toLocaleString()}</div>
    <div class="cal-label">Calories Today</div>
  </div>

  <div class="card card-p6 mb-6">
    <div class="section-header">${icons.utensils}<h3>Log Meal</h3></div>
    <input type="text" placeholder="Meal name (optional)" value="${state.currentMealName}" oninput="state.currentMealName=this.value" class="mb-3">
    <div class="grid-3-sm mb-4">
      <div><label class="input-label">Protein (g)</label><input type="number" placeholder="0" value="${state.currentMacros.protein}" oninput="state.currentMacros.protein=this.value"></div>
      <div><label class="input-label">Carbs (g)</label><input type="number" placeholder="0" value="${state.currentMacros.carbs}" oninput="state.currentMacros.carbs=this.value"></div>
      <div><label class="input-label">Fats (g)</label><input type="number" placeholder="0" value="${state.currentMacros.fats}" oninput="state.currentMacros.fats=this.value"></div>
    </div>
    <button class="btn-cyan-full" onclick="logMeal(state.currentMacros.protein,state.currentMacros.carbs,state.currentMacros.fats,state.currentMealName)">${icons.plus} Log Meal</button>
  </div>

  <div class="card card-p6 mb-6">
    <h3 class="mb-4">Save to Meal Library</h3>
    <input type="text" placeholder="Meal name (e.g., Morning Shake)" value="${state.mealName}" oninput="state.mealName=this.value" class="mb-3">
    <button class="btn-slate" onclick="saveMealToLibrary()">${icons.save} Save Current Macros</button>
  </div>

  ${state.savedMeals.length > 0 ? `
  <div class="card card-p6 mb-6">
    <h3 class="mb-4">Meal Library</h3>
    <input type="text" placeholder="Search meals..." value="${state.mealSearch}" oninput="state.mealSearch=this.value;render()" class="mb-3">
    <div class="space-y">
      ${filtered.length === 0 ? '<div style="color:#64748b;text-align:center;padding:1rem">No meals found</div>' :
        filtered.map(m => `
        <div class="lib-item">
          <div class="flex-1">
            <div class="lib-name">${m.name}</div>
            <div class="lib-macros">P: ${m.protein}g &bull; C: ${m.carbs}g &bull; F: ${m.fats}g</div>
          </div>
          <div class="lib-actions">
            <button class="btn-log-meal" onclick="logMeal(${m.protein},${m.carbs},${m.fats},'${m.name.replace(/'/g,"\\'")}')">Log</button>
            <button class="btn-delete" onclick="deleteSavedMeal(${m.id})">${icons.x}</button>
          </div>
        </div>`).join('')}
    </div>
  </div>` : ''}

  ${todayEntries.length > 0 ? `
  <div class="card card-p6 mb-6">
    <div class="section-header">${icons.calendar}<h3>Today's Meals</h3></div>
    <div class="space-y">
      ${[...todayEntries].reverse().map(e => `
      <div class="meal-item">
        <div class="meal-item-header">
          <span class="meal-name">${e.name}</span>
          <div class="meal-actions">
            <span class="meal-time">${e.timestamp}</span>
            <button class="btn-delete" onclick="deleteMealEntry(${e.id})">${icons.x16}</button>
          </div>
        </div>
        <div class="meal-macros">P: ${e.protein}g &bull; C: ${e.carbs}g &bull; F: ${e.fats}g &bull; ${calcCals(e.protein,e.carbs,e.fats)} cal</div>
      </div>`).join('')}
    </div>
  </div>` : ''}

  ${state.waterTrackerEnabled ? `
  <div class="card card-p6">
    <h3 class="mb-4">💧 Water Tracker</h3>
    <div class="flex gap-3 mb-3">
      <input type="number" placeholder="Amount (oz)" value="${state.currentWater}" oninput="state.currentWater=this.value" style="flex:1">
      <button class="btn-cyan" onclick="logWater()">Log</button>
    </div>
    <div class="water-display">
      <div class="water-oz">${calcWater(state.waterLog, dayId)} oz</div>
      <div class="water-today">Today</div>
    </div>
  </div>` : ''}

  ` : `
  <div class="empty">
    <div class="empty-title">No active day</div>
    <div class="empty-sub">Click "Start New Day" to begin tracking</div>
  </div>
  `}`;
}

function renderSettings() {
  return `
  <div class="flex items-center justify-between mb-6">
    <h2>${icons.settings} Settings</h2>
    <button class="btn-back" onclick="state.view='main';render()">${icons.x}</button>
  </div>

  ${targetSection('training', 'Training Day')}
  ${targetSection('nonTraining', 'Rest Day')}
  ${targetSection('other', 'Other Day')}

  <div class="target-card">
    <div class="flex items-center gap-2 mb-4">${icons.weight}<h3>Weight Tracking</h3></div>
    <div class="flex gap-3 mb-4">
      <input type="number" placeholder="Current weight (lbs)" value="${state.currentWeight}" oninput="state.currentWeight=this.value" style="flex:1">
      <button class="btn-cyan" onclick="logWeight()">Log</button>
    </div>
    ${state.weightLog.length > 0 ? `
    <div class="text-sm" style="color:#94a3b8;margin-bottom:.5rem">Recent Entries:</div>
    ${state.weightLog.slice(-5).reverse().map(e => `
    <div class="weight-entry">
      <span style="font-weight:600;color:#fff">${e.weight} lbs</span>
      <span style="color:#94a3b8">${e.date}</span>
    </div>`).join('')}` : ''}
  </div>

  <div class="target-card">
    <h3 class="mb-4">Water Tracker</h3>
    <div class="water-toggle">
      <span class="water-toggle-label">Enable Water Tracking</span>
      <button class="${state.waterTrackerEnabled ? 'toggle-on' : 'toggle-off'}" onclick="state.waterTrackerEnabled=!state.waterTrackerEnabled;persist();render()">
        ${state.waterTrackerEnabled ? 'Enabled' : 'Disabled'}
      </button>
    </div>
    <div class="text-sm" style="color:#94a3b8">Track daily water consumption in ounces or ml</div>
  </div>

  <div class="target-card">
    <h3 class="mb-4">Data Backup &amp; Restore</h3>
    <button class="btn-cyan-full mb-2" onclick="exportData()">${icons.save} Export Data (Backup)</button>
    <label class="file-label">${icons.plus} Import Data (Restore)<input type="file" accept=".json" style="display:none" onchange="importData(this.files[0])"></label>
    <div class="backup-note">Export your data to save a backup. Import to restore from a previous backup file.</div>
  </div>`;
}

function renderWeekly() {
  const wt = calcTotals(state.weeklyLog);
  const n = state.closedDays.length || 1;
  const avgP = Math.round(wt.protein/n);
  const avgC = Math.round(wt.carbs/n);
  const avgF = Math.round(wt.fats/n);
  const totalCal = calcCals(wt.protein, wt.carbs, wt.fats);
  const avgCal = Math.round(totalCal/n);
  const totalWater = calcWater(state.waterLog);
  const avgWater = Math.round(totalWater/n);

  const last7 = state.closedDays.slice(-7);
  const maxCal = Math.max(...last7.map(d => d.calories), 100);

  const barChart = last7.length > 0 ? `
  <div class="card card-p6 mb-6">
    <h3 class="mb-4">Daily Calorie Chart</h3>
    <div class="chart-wrap">
      ${last7.map(day => {
        const tgt = calcCals(day.targets.protein, day.targets.carbs, day.targets.fats);
        const p = tgt > 0 ? (day.calories/tgt)*100 : 0;
        const h = (day.calories/maxCal)*90;
        const color = p >= 90 && p <= 110 ? '#22c55e' : p >= 80 && p <= 120 ? '#eab308' : '#ef4444';
        const dateStr = new Date(day.startTime).toLocaleDateString('en-US', { month:'short', day:'numeric' });
        return `<div class="chart-col">
          <div class="chart-bar" style="height:${h}%;background:${color}"></div>
          <div class="chart-labels">
            <div class="chart-cal">${day.calories}</div>
            <div class="chart-date">${dateStr}</div>
            <div class="chart-pct">${Math.round(p)}%</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>` : '';

  const waterChart = state.waterTrackerEnabled && last7.length > 0 ? (() => {
    const waters = last7.map(d => calcWater(state.waterLog, d.id));
    const maxW = Math.max(...waters, 100);
    return `<div class="card card-p6 mb-6">
      <h3 class="mb-4">💧 Daily Water Intake Chart</h3>
      <div class="chart-wrap">
        ${last7.map((day, i) => {
          const w = waters[i];
          const h = (w/maxW)*90;
          const dateStr = new Date(day.startTime).toLocaleDateString('en-US', { month:'short', day:'numeric' });
          return `<div class="chart-col">
            <div class="chart-bar" style="height:${Math.max(h, w>0?2:0)}%;background:#06b6d4"></div>
            <div class="chart-labels">
              <div class="chart-cal">${w} oz</div>
              <div class="chart-date">${dateStr}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  })() : '';

  const closedDaysList = state.closedDays.slice().reverse().map(day => {
    const tgt = calcCals(day.targets.protein, day.targets.carbs, day.targets.fats);
    const calPct = tgt > 0 ? (day.calories/tgt)*100 : 0;
    const dotColor = calPct >= 90 && calPct <= 110 ? '#4ade80' : calPct >= 80 && calPct <= 120 ? '#facc15' : '#f87171';
    const isEditing = state.editingDayId === day.id;
    const dtLabel = day.dayType === 'training' ? 'Training Day' : day.dayType === 'nonTraining' ? 'Rest Day' : 'Other Day';
    return `<div class="closed-day">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <div class="closed-dot" style="background:${dotColor}"></div>
          <div>
            <div class="closed-time">${day.startTime}</div>
            <div class="closed-end">to ${day.endTime}</div>
          </div>
        </div>
        <button class="btn-text-cyan" onclick="state.editingDayId=${isEditing ? 'null' : day.id};render()">
          ${icons.plus} ${isEditing ? 'Cancel' : 'Add Meal'}
        </button>
      </div>
      ${isEditing ? `
      <div class="edit-panel">
        <input type="text" placeholder="Meal name (optional)" value="${state.editMacros.name}" oninput="state.editMacros.name=this.value" class="mb-2">
        <div class="grid-3-sm mb-2">
          <input type="number" placeholder="Protein" value="${state.editMacros.protein}" oninput="state.editMacros.protein=this.value">
          <input type="number" placeholder="Carbs" value="${state.editMacros.carbs}" oninput="state.editMacros.carbs=this.value">
          <input type="number" placeholder="Fats" value="${state.editMacros.fats}" oninput="state.editMacros.fats=this.value">
        </div>
        <button class="btn-cyan-full" onclick="addMealToClosedDay(${day.id})">Add to This Day</button>
      </div>` : ''}
      <div class="closed-macros">
        <div class="${day.totals.protein >= day.targets.protein ? 'macro-hit' : 'macro-miss'}">${day.totals.protein >= day.targets.protein ? icons.check : icons.xcircle} P: ${day.totals.protein}g</div>
        <div class="${day.totals.carbs >= day.targets.carbs ? 'macro-hit' : 'macro-miss'}">${day.totals.carbs >= day.targets.carbs ? icons.check : icons.xcircle} C: ${day.totals.carbs}g</div>
        <div class="${day.totals.fats >= day.targets.fats ? 'macro-hit' : 'macro-miss'}">${day.totals.fats >= day.targets.fats ? icons.check : icons.xcircle} F: ${day.totals.fats}g</div>
      </div>
      <div class="closed-summary">${day.calories.toLocaleString()} cal (${Math.round(calPct)}% of target) &bull; ${dtLabel}</div>
    </div>`;
  }).join('');

  return `
  <div class="flex items-center justify-between mb-6">
    <h2>${icons.calendar} Weekly Summary</h2>
    <button class="btn-back" onclick="state.view='main';render()">${icons.x}</button>
  </div>

  <div class="grid-3 mb-6">
    <div class="weekly-stat-card"><div class="stat-label">Protein</div><div class="stat-value">${wt.protein}g</div><div class="stat-avg">Avg: ${avgP}g/day</div></div>
    <div class="weekly-stat-card"><div class="stat-label">Carbs</div><div class="stat-value">${wt.carbs}g</div><div class="stat-avg">Avg: ${avgC}g/day</div></div>
    <div class="weekly-stat-card"><div class="stat-label">Fats</div><div class="stat-value">${wt.fats}g</div><div class="stat-avg">Avg: ${avgF}g/day</div></div>
  </div>

  <div class="cal-total-card">
    <div class="cal-total-num">${totalCal.toLocaleString()}</div>
    <div class="cal-label mb-2">Total Calories This Week</div>
    <div class="text-sm" style="color:#64748b">Average: ${avgCal.toLocaleString()} cal/day</div>
  </div>

  ${state.waterTrackerEnabled ? `
  <div class="card card-p6 mb-6">
    <h3 class="mb-2">💧 Weekly Water Intake</h3>
    <div class="water-total">${totalWater} oz</div>
    <div class="text-sm" style="color:#94a3b8">Average: ${avgWater} oz/day</div>
  </div>` : ''}

  ${barChart}
  ${waterChart}

  <div class="card card-p6">
    <h3 class="mb-4">Closed Days</h3>
    ${state.closedDays.length === 0 ? '<div style="color:#64748b;text-align:center;padding:2rem">No closed days yet</div>' : closedDaysList}
  </div>`;
}

// ─── Main render ──────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (state.view === 'settings') app.innerHTML = renderSettings();
  else if (state.view === 'weekly') app.innerHTML = renderWeekly();
  else app.innerHTML = renderMain();
}

// ─── Clock ────────────────────────────────────────────────────────────────────
setInterval(() => {
  state.currentTime = new Date();
  if (state.view === 'main') {
    const dateEl = document.querySelector('.header-date');
    const timeEl = document.querySelector('.header-time');
    if (dateEl) dateEl.textContent = state.currentTime.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
    if (timeEl) timeEl.textContent = state.currentTime.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', second:'2-digit' });
  }
}, 1000);

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
